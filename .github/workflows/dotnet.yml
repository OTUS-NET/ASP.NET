# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies Unit
      working-directory: ./Homeworks/UnitTests/src
      run: dotnet restore
    - name: Restore dependencies EF
      working-directory: ./Homeworks/EF/src
      run: dotnet restore PromoCodeFactory.sln
    - name: Build Unit
      working-directory: ./Homeworks/UnitTests/src
      run: dotnet build --no-restore
    - name: Build EF
      working-directory: ./Homeworks/EF/src
      run: dotnet build PromoCodeFactory.sln --no-restore
    - name: Test
      working-directory: ./Homeworks/UnitTests/src
      run: dotnet test --no-build --verbosity normal
